<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codenix | Plataforma de Práctica Algorítmica</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Anti-FOUC: lee el tema guardado y aplica data-theme en el <html>
         ANTES de que React hidrate, evitando el parpadeo de color. -->
    <script>
      (function () {
        var SETTINGS_KEY = 'codenix_app_settings';
        var theme = 'dark';
        try {
          var raw = localStorage.getItem(SETTINGS_KEY);
          if (raw) {
            var parsed = JSON.parse(raw);
            if (parsed && (parsed.theme === 'light' || parsed.theme === 'dark' || parsed.theme === 'system')) {
              theme = parsed.theme;
            }
          }
        } catch (e) {}
        if (theme === 'system') {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
